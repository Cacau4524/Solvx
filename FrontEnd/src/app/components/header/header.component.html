<header class="header" [class.header--scrolled]="isScrolled()">
  <div class="container header__inner">
    <a routerLink="/" class="header__brand">
      <img src="assets/logo.png" alt="Solvy" class="header__logo" />
      <span class="header__brand-name">solvy</span>
    </a>

    <nav class="header__nav" [class.header__nav--open]="isMenuOpen()">
      @for (item of navItems; track item.href) {
        <a [href]="item.href" class="header__nav-link" (click)="closeMenu()">{{ item.label }}</a>
      }
    </nav>

    <div class="header__actions">
      <button type="button" class="btn btn--text" (click)="login()">Entrar</button>
      <button type="button" class="btn btn--primary" (click)="signup()">Cadastrar</button>
    </div>

    <button type="button" class="header__burger" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
