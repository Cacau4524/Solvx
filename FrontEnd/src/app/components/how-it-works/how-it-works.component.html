<section class="how section" id="como-funciona" appObserveVisibility (visible)="onVisible()">
  <div class="container">

    <div class="section__head">
      <span class="section__eyebrow">Simples assim</span>
      <h2 class="section__title">Como funciona</h2>
      <p class="section__subtitle" style="margin:0 auto;">Do pedido à avaliação, tudo em quatro passos.</p>
    </div>

    @if (visible()) {
      <div class="how__timeline" @staggerList>
        @for (step of steps; track step.number; let last = $last) {
          <div class="how__step">
            <div class="how__step-card" @fadeInUp>
              <span class="how__step-number">{{ step.number }}</span>
              <div class="how__step-icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                  @switch (step.icon) {
                    @case ('search') { <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/> }
                    @case ('file') { <path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/> }
                    @case ('handshake') { <path d="M8 12l3 3 6-6"/><circle cx="12" cy="12" r="10"/> }
                    @case ('star') { <path d="M12 3l2.6 5.9 6.4.6-4.8 4.2 1.4 6.3L12 16.9 6.4 20l1.4-6.3-4.8-4.2 6.4-.6z"/> }
                  }
                </svg>
              </div>
              <p class="how__step-title">{{ step.title }}</p>
            </div>
            @if (!last) {
              <svg class="how__arrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M5 12h14M13 6l6 6-6 6"/>
              </svg>
            }
          </div>
        }
      </div>
    }

  </div>
</section>
