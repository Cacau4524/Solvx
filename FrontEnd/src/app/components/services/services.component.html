<section class="services section" id="servicos" appObserveVisibility (visible)="onVisible()">
  <div class="container">

    <div class="section__head">
      <span class="section__eyebrow">O que oferecemos</span>
      <h2 class="section__title">Serviços mais procurados</h2>
      <p class="section__subtitle" style="margin:0 auto;">Profissionais qualificados para cuidar de cada detalhe da sua casa.</p>
    </div>

    @if (visible()) {
      <div class="services__grid" @staggerList>
        @for (service of services; track service.name) {
          <div class="service-card" @fadeInUp>
            <div class="service-card__icon">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                @switch (service.icon) {
                  @case ('bolt') { <path d="M13 2 4 14h7l-1 8 9-12h-7z"/> }
                  @case ('drop') { <path d="M12 2s7 8 7 13a7 7 0 0 1-14 0c0-5 7-13 7-13z"/> }
                  @case ('brush') { <path d="M4 20l4-1 10-10-3-3L5 16l-1 4z"/><path d="M14.5 5.5l3 3"/> }
                  @case ('sparkle') { <path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8L12 2z"/> }
                  @case ('hammer') { <path d="M15 3l6 6-3 3-6-6 3-3z"/><path d="M13 8 3 18v3h3l10-10"/> }
                  @case ('leaf') { <path d="M4 20c8 1 14-5 15-15C10 4 5 10 4 20z"/><path d="M4 20c2-4 5-7 9-9"/> }
                  @case ('house') { <path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/> }
                  @case ('snow') { <path d="M12 2v20M4 7l16 10M20 7 4 17"/> }
                }
              </svg>
            </div>
            <h3 class="service-card__name">{{ service.name }}</h3>
            <p class="service-card__desc">{{ service.description }}</p>
          </div>
        }
      </div>
    }

  </div>
</section>
