<section class="legal-banner">
  <div class="container">
    <nav class="legal-breadcrumb" aria-label="breadcrumb">
      <a routerLink="/">Início</a>
      <span>/</span>
      <span>{{ title }}</span>
    </nav>
    <h1>{{ title }}</h1>
    @if (subtitle) { <p>{{ subtitle }}</p> }
  </div>
</section>

<section class="legal-content">
  <div class="container">
    <button type="button" class="legal-back" (click)="goBack()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Voltar
    </button>

    <div class="legal-body">
      <ng-content></ng-content>
    </div>
  </div>
</section>
