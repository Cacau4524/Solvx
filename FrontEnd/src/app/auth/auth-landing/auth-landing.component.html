<div class="auth-shell">
  <header class="auth-topbar">
    <a routerLink="/" class="auth-topbar__brand">
      <img src="assets/logo.png" alt="Solvy" />
      <span>solvy</span>
    </a>
    <button type="button" class="auth-topbar__back" (click)="goBack()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Voltar
    </button>
  </header>

  <main class="auth-hero">
    <h1>Como você quer continuar?</h1>
    <p>Escolha o perfil que combina com o que você precisa hoje.</p>

    <div class="auth-cards" @cardsIn>

      <article class="auth-card">
        <div class="auth-card__icon auth-card__icon--blue">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-1a7 7 0 0 1 14 0v1"/><circle cx="11" cy="7" r="4"/></svg>
        </div>
        <h2>Sou Cliente</h2>
        <p>Solicite serviços de forma rápida e segura.</p>
        <div class="auth-card__actions">
          <a routerLink="/auth/client/login" class="btn-auth btn-auth--primary">Entrar</a>
          <a routerLink="/auth/client/register" class="btn-auth btn-auth--ghost">Criar conta</a>
        </div>
      </article>

      <article class="auth-card">
        <div class="auth-card__icon auth-card__icon--green">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 0 0 5.4-5.4l-2.5 2.5-2-2z"/></svg>
        </div>
        <h2>Sou Prestador de Serviços</h2>
        <p>Cadastre-se para oferecer seus serviços e conquistar novos clientes.</p>
        <div class="auth-card__actions">
          <a routerLink="/auth/provider/login" class="btn-auth btn-auth--primary btn-auth--green">Entrar</a>
          <a routerLink="/auth/provider/register" class="btn-auth btn-auth--ghost btn-auth--ghost-green">Quero me cadastrar</a>
        </div>
      </article>

    </div>
  </main>
</div>
